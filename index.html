<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool of Experts</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --water:#a3e5f7; --water-deep:#5cb9da; --ui:#d7f4ff; --ui-head:#70cbe8;
  --pink:#ffc2df; --pink-card:#ffe1ef; --tile:#9ae2f6;
  --gold:#ffcf4d; --gold-deep:#e8a200; --warn:#ff8a5c; --danger:#e8526b;
  --ink:#143041; --ink-soft:#3a6378; --paper:#fffdf6; --ok:#4fb286; --line:#bfe0ec;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Space Grotesk',system-ui,sans-serif; color:var(--ink);
  background:var(--water);
  background-image:
    radial-gradient(circle at 18% 28%, rgba(255,255,255,.32) 0 2px, transparent 3px),
    radial-gradient(circle at 72% 62%, rgba(255,255,255,.22) 0 2px, transparent 3px),
    linear-gradient(rgba(255,255,255,.12) 2px, transparent 2px),
    linear-gradient(90deg, rgba(255,255,255,.12) 2px, transparent 2px);
  background-size:170px 170px,210px 210px,36px 36px,36px 36px;
  min-height:100vh; display:flex; flex-direction:column;
}
img{image-rendering:pixelated}

.frame{
  width:min(1120px,95vw); margin:22px auto; flex:1;
  background:rgba(215,244,255,.72); border:5px solid var(--ink);
  border-radius:18px; box-shadow:14px 14px 0 rgba(20,48,65,.18);
  display:flex; flex-direction:column; overflow:hidden;
}
.titlebar{
  font-family:'VT323',monospace; background:var(--ui);
  border-bottom:5px solid var(--ink); padding:8px 18px;
  display:flex; align-items:center; gap:12px; letter-spacing:1px;
}
.titlebar .logo{font-size:30px;line-height:1}
.titlebar .tag{font-size:17px;color:var(--ink-soft);margin-left:2px}
.titlebar .dots{margin-left:auto;display:flex;gap:7px}
.titlebar .dots i{width:15px;height:15px;border:2px solid var(--ink);border-radius:50%;background:#fff}
.titlebar .dots i:last-child{background:var(--danger)}

.phasebar{
  font-family:'VT323',monospace; font-size:17px; display:flex; gap:6px;
  padding:7px 18px; background:var(--ui-head); border-bottom:5px solid var(--ink); flex-wrap:wrap;
}
.phasebar b{padding:1px 10px;border:2px solid transparent;border-radius:7px;opacity:.45;white-space:nowrap}
.phasebar b.on{opacity:1;background:#fff;border-color:var(--ink)}
.phasebar b.done{opacity:.7}

.stage{flex:1;padding:26px clamp(16px,4vw,40px);overflow-y:auto}

h1{font-family:'VT323',monospace;font-size:clamp(34px,6vw,58px);line-height:.95;letter-spacing:1px;margin-bottom:14px}
h2{font-family:'VT323',monospace;font-size:clamp(24px,4vw,38px);margin-bottom:10px}
.lede{font-size:18px;max-width:60ch;line-height:1.5;color:var(--ink-soft);margin-bottom:8px}
p{line-height:1.55;max-width:64ch}
.spacer{height:16px}

.btn{
  font-family:'VT323',monospace; font-size:24px; letter-spacing:1px; cursor:pointer;
  background:var(--gold); border:4px solid var(--ink); border-radius:10px;
  padding:8px 26px; box-shadow:5px 5px 0 var(--ink); transition:transform .05s,box-shadow .05s;
}
.btn:hover{transform:translate(2px,2px);box-shadow:3px 3px 0 var(--ink)}
.btn:active{transform:translate(5px,5px);box-shadow:0 0 0 var(--ink)}
.btn:disabled{cursor:not-allowed;opacity:.45;background:#cfe6ef;box-shadow:5px 5px 0 rgba(20,48,65,.3)}
.btn.ghost{background:var(--ui)}
.btnbar{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px;align-items:center}

/* ---- Vienna email ---- */
.mail{
  max-width:560px; background:var(--paper); border:4px solid var(--ink);
  border-radius:12px; box-shadow:7px 7px 0 rgba(20,48,65,.16); overflow:hidden;
}
.mail .from{
  display:flex;align-items:center;gap:12px;padding:13px 18px;
  background:var(--ui); border-bottom:3px solid var(--ink);
}
.mail .crest{
  width:42px;height:42px;flex:0 0 auto;border:3px solid var(--ink);border-radius:7px;
  background:linear-gradient(160deg,#e8526b 0 50%,#fff 50% 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'VT323',monospace;font-size:13px;line-height:.9;text-align:center;color:var(--ink);
}
.mail .who{font-weight:700}
.mail .who small{display:block;font-weight:400;color:var(--ink-soft);font-size:13px}
.mail .subject{padding:12px 18px 4px;font-family:'VT323',monospace;font-size:24px}
.mail .body{padding:4px 18px 18px;font-size:15px;line-height:1.55;color:#23434f}

/* ---- selection ---- */
.selbar{
  position:sticky; top:-26px; z-index:6; background:var(--ui); border:4px solid var(--ink);
  border-radius:10px; padding:10px 16px; display:flex; align-items:center; gap:16px;
  flex-wrap:wrap; margin-bottom:16px; box-shadow:5px 5px 0 rgba(20,48,65,.15);
}
.counter{font-family:'VT323',monospace;font-size:30px;line-height:1}
.counter small{font-size:15px;display:block;color:var(--ink-soft)}
.timer{font-family:'VT323',monospace;font-size:26px;padding:2px 12px;border:3px solid var(--ink);border-radius:8px;background:#fff}
.timer.low{background:#ffd9df;color:var(--danger);border-color:var(--danger)}
.hint{font-size:13px;color:var(--ink-soft);max-width:42ch;line-height:1.45}
.selbar .btn{margin-left:auto;font-size:20px;padding:6px 20px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.card{
  position:relative; background:var(--paper); border:3px solid var(--ink); border-radius:10px;
  padding:13px 14px 12px; cursor:pointer; transition:transform .08s,box-shadow .08s;
  box-shadow:4px 4px 0 rgba(20,48,65,.14); display:flex; flex-direction:column;
}
.card:hover{transform:translateY(-3px);box-shadow:4px 7px 0 rgba(20,48,65,.18)}
.card.sel{background:#fff4d6;border-color:var(--gold-deep);box-shadow:4px 4px 0 var(--gold-deep)}
.card.sel::after{
  content:"✓ on jury"; position:absolute;top:-12px;right:10px;
  font-family:'VT323',monospace;font-size:16px;background:var(--gold);
  border:2px solid var(--ink);border-radius:6px;padding:0 8px;
}
.card .nm{font-family:'VT323',monospace;font-size:23px;line-height:1;margin-bottom:2px}
.card .sp{font-weight:700;font-size:14px;margin:6px 0 7px}
.card .bio{font-size:13px;line-height:1.42;color:#2c4d5e;flex:1}

/* criteria reveal chips */
.crit{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;border-top:2px dotted var(--line);padding-top:9px}
.chip{
  font-size:12px; font-family:'VT323',monospace; font-size:15px; letter-spacing:.3px;
  border:2px solid var(--ink-soft); border-radius:6px; padding:1px 8px; cursor:pointer;
  background:#eef7fb; color:var(--ink-soft); user-select:none;
}
.chip:hover{background:#dff0f7}
.chip.shown{background:#fff;color:var(--ink);border-color:var(--ink)}
.chip .val{font-weight:700;color:var(--ink)}
.chip.peeked{border-style:solid}
.chip.comp{border-color:var(--ok);color:#2c6e54;background:#e9f7f0}
.chip.comp.shown{background:#fff}

/* golden AI pre-pick (phase 4 only, here used in auto sequence) */
.card.ai{box-shadow:0 0 0 3px var(--gold) inset,4px 4px 0 rgba(20,48,65,.14);border-color:var(--gold-deep)}

/* ---- modal ---- */
.scrim{position:fixed;inset:0;background:rgba(20,48,65,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:40;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);border:5px solid var(--ink);border-radius:14px;max-width:480px;width:100%;box-shadow:10px 10px 0 rgba(20,48,65,.3);overflow:hidden}
.modal .head{font-family:'VT323',monospace;font-size:26px;padding:12px 18px;border-bottom:4px solid var(--ink);display:flex;gap:10px;align-items:center}
.modal.warn .head{background:#ffe6c2}
.modal.danger .head{background:#ffd9df}
.modal .body{padding:18px 20px}
.modal .body p{font-size:15px;margin-bottom:12px}
.modal .body .quote{background:#f0f6f9;border-left:4px solid var(--ink-soft);padding:10px 14px;font-size:14px;font-style:italic;color:#2c4d5e;margin-bottom:14px}
.modal .foot{display:flex;gap:10px;justify-content:flex-end;padding:0 20px 18px}
.modal .btn{font-size:19px;padding:5px 16px;box-shadow:4px 4px 0 var(--ink)}

/* ---- learned profile bars ---- */
.bars{max-width:520px;margin:14px 0}
.bar{display:flex;align-items:center;gap:12px;margin:9px 0}
.bar .lab{width:130px;font-size:14px;text-align:right;color:var(--ink-soft)}
.bar .track{flex:1;height:22px;background:#fff;border:3px solid var(--ink);border-radius:6px;overflow:hidden}
.bar .fill{height:100%;background:var(--gold);transition:width .5s ease}
.bar .fill.comp{background:var(--ok)}
.bar .num{font-family:'VT323',monospace;font-size:20px;width:28px}

/* ---- pool reveal ---- */
.poolwrap{max-width:820px}
.pool{background:linear-gradient(180deg,var(--water) 0%,var(--water-deep) 100%);border:4px solid var(--ink);border-radius:12px;padding:18px;margin:16px 0}
.lane{display:flex;align-items:flex-end;gap:6px;border:3px solid var(--ink);border-radius:8px;padding:10px 10px 6px;margin-bottom:10px;background:rgba(255,255,255,.22);min-height:96px;flex-wrap:wrap}
.lane .label{font-family:'VT323',monospace;font-size:18px;width:100%;margin-bottom:4px;display:flex;justify-content:space-between;align-items:baseline}
.lane .label span{font-size:14px;color:var(--ink-soft)}
.station{width:40px;height:64px;flex:0 0 auto;border:2px dashed var(--ink-soft);border-radius:5px;display:flex;align-items:flex-end;justify-content:center;background:rgba(255,255,255,.4);position:relative}
.station.full{border-style:solid;background:rgba(255,255,255,.72)}
.station.over{border-color:var(--danger)}
.station img{width:22px;height:48px}
.station .dress{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:13px}
.overflow{font-family:'VT323',monospace;font-size:16px;color:var(--danger);align-self:center;padding:0 8px}
.empties{font-family:'VT323',monospace;font-size:16px;color:var(--ink-soft);align-self:center;padding:0 8px}
.tally{display:flex;gap:24px;font-family:'VT323',monospace;font-size:24px;margin:8px 0 4px;flex-wrap:wrap}
.tally .target{color:var(--ink-soft)}
.runcount{font-family:'VT323',monospace;font-size:30px;margin:6px 0}

/* ---- outro ---- */
.slide{max-width:62ch}
.stat-row{display:flex;flex-wrap:wrap;gap:20px;margin:18px 0}
.stat{background:var(--paper);border:3px solid var(--ink);border-radius:10px;padding:14px 18px;flex:1;min-width:170px;box-shadow:4px 4px 0 rgba(20,48,65,.14)}
.stat .n{font-family:'VT323',monospace;font-size:46px;line-height:1}
.stat .t{font-size:14px;color:var(--ink-soft);line-height:1.35;margin-top:4px}
.disc{font-size:13px;color:var(--ink-soft);font-style:italic;margin-top:16px;max-width:60ch;line-height:1.5}
.dotnav{display:flex;gap:8px;margin-top:22px}
.dotnav i{width:12px;height:12px;border:2px solid var(--ink);border-radius:50%;background:#fff}
.dotnav i.on{background:var(--ink)}
.qlist{max-width:60ch;margin:6px 0 0}
.qlist li{margin:10px 0;line-height:1.5}
.verdict{background:var(--paper);border:3px solid var(--ink);border-radius:10px;padding:16px 20px;max-width:60ch;box-shadow:5px 5px 0 rgba(20,48,65,.15);margin:10px 0}
.verdict .tagline{font-family:'VT323',monospace;font-size:26px;margin-bottom:8px}

/* ---- application review (phase 2) ---- */
.appcard{background:var(--paper);border:3px solid var(--ink);border-radius:12px;padding:18px 20px;max-width:620px;box-shadow:6px 6px 0 rgba(20,48,65,.16);margin-bottom:16px}
.apphead .badge{display:inline-block;font-family:'VT323',monospace;font-size:16px;background:var(--ui-head);border:2px solid var(--ink);border-radius:6px;padding:0 9px;margin-bottom:4px}
.appcard h2{font-family:'VT323',monospace}
.appcard p{font-size:15px;line-height:1.55;color:#23434f}
.appcrit{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 14px;border-top:2px dotted var(--line);padding-top:10px}
.appactions{display:flex;gap:10px;flex-wrap:wrap}
.appactions .btn{font-size:20px;padding:6px 22px}
.stacks{display:flex;gap:12px;flex-wrap:wrap;max-width:620px}
.stack{flex:1;min-width:150px;background:var(--ui);border:3px solid var(--ink);border-radius:9px;padding:8px 12px}
.stack h4{font-family:'VT323',monospace;font-size:18px;margin-bottom:4px}
.stack ul{list-style:none;font-size:13px;line-height:1.5}
.stack li{padding:1px 0;border-bottom:1px dotted var(--line)}
.stack li:last-child{border-bottom:none}

/* ---- HUD ---- */
.hud{display:flex;gap:10px;padding:9px 18px;background:var(--ui-head);border-bottom:5px solid var(--ink);flex-wrap:wrap}
.gauge{flex:1;min-width:170px;background:var(--paper);border:3px solid var(--ink);border-radius:10px;padding:7px 13px;box-shadow:4px 4px 0 rgba(20,48,65,.14)}
.gauge .k{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px}
.gauge .v{font-family:'VT323',monospace;font-size:30px;line-height:1.05}
.gauge .sub{font-size:11px;color:var(--ink-soft)}
.gauge.gflash{animation:gflash .5s ease}
@keyframes gflash{0%{background:#fff4d6}100%{background:var(--paper)}}
.rep .bar{height:12px;border:3px solid var(--ink);border-radius:6px;background:#fff;margin-top:5px;overflow:hidden}
.rep .fill{height:100%;background:var(--ok);transition:width .4s ease,background .4s ease}
.feed{font-family:'VT323',monospace;font-size:18px;background:var(--ink);color:#bfe9f7;
  padding:6px 18px;display:flex;gap:10px;align-items:center;border-bottom:5px solid var(--ink)}
.feed b{color:var(--gold)}.feed .src{color:#7fb8cc}
.money-gauge{border-color:var(--danger)!important;background:#fff0f2!important}
.time-gauge{border-color:var(--warn)!important;background:#fff6f0!important}
.btn .cost{display:block;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:0;color:var(--ink-soft);font-weight:500;margin-top:1px}
.btnbar.col{flex-direction:column;align-items:flex-start}
.btnbar.col .btn{width:100%;max-width:560px;text-align:left}
.art{border:3px solid var(--ink);border-radius:10px;overflow:hidden;margin-bottom:12px;box-shadow:4px 4px 0 rgba(20,48,65,.14)}
.art svg{display:block;width:100%;height:auto}

/* ---- opening scene ---- */
.beatlabel{font-family:'VT323',monospace;font-size:18px;color:var(--ink-soft);letter-spacing:1px;margin-bottom:4px}
.fadein{animation:fadein .35s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

@media (max-width:560px){
  .frame{width:97vw;margin:10px auto}
  .selbar .btn{margin-left:0;width:100%}
  .phasebar{font-size:14px}
  .bar .lab{width:96px;font-size:12px}
  .appactions .btn{width:100%}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="frame">
  <div class="titlebar">
    <span class="logo">◍ POOL OF EXPERTS</span>
    <span class="tag"></span>
    <span class="dots"><i></i><i></i><i></i></span>
  </div>
  <div class="hud" id="hud" style="display:none">
    <div class="gauge money-gauge" id="g-money">
      <div class="k">💶 Public money burned</div>
      <div class="v" id="hud-money">€0</div>
      <div class="sub">+€50,000 per week of delay</div>
    </div>
    <div class="gauge time-gauge" id="g-time">
      <div class="k">📅 Schedule</div>
      <div class="v" id="hud-weeks">on time</div>
      <div class="sub" id="hud-deadline">deadline: 01 Aug 2026</div>
    </div>
    <div class="gauge rep" id="g-rep">
      <div class="k">Reputation</div>
      <div class="v" id="hud-repword">Solid</div>
      <div class="bar"><div class="fill" id="hud-repfill" style="width:100%"></div></div>
    </div>
  </div>
  <div class="feed" id="feed" style="display:none">
    <span class="src">Quiet news day</span> — the call has just opened.
  </div>
  <div class="phasebar" id="phasebar"></div>
  <div class="stage" id="stage"></div>
</div>
<script src="data.js"></script>
<script src="game.js"></script>
<script src="draft-p1-cards.js"></script>
<script src="draft-letter.js"></script>
<script src="draft-reveal.js"></script>
<script src="draft-foreigners.js"></script>
<script>/* boot last: every scene handler (incl. draft modules) is now defined */ go("intro");</script>
</body>
</html>
